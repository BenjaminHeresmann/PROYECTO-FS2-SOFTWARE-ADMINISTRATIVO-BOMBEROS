<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA BOMBEROS - Iniciar Sesión</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <!-- Página de Login - Punto de entrada principal -->
    <div class="login-page">
        <div class="login-container">
            <div class="login-header">
                <img src="../assets/logo-compania-2.png" alt="2DA COMPAÑÍA DE BOMBEROS" class="login-logo">
                <h1>SISTEMA ADMINISTRATIVO BOMBEROS</h1>
                <h2>SEGUNDA COMPAÑÍA DE BOMBEROS VIÑA DEL MAR</h2>
            </div>
            
            <div class="login-form-container">
                <form id="loginForm" class="login-form">
                    <div class="form-group">
                        <label for="email">Usuario o Correo Electrónico:</label>
                        <input type="text" id="email" name="email" required placeholder="admin o usuario@bomberos.cl">
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Contraseña:</label>
                        <input type="password" id="password" name="password" required placeholder="Ingrese su contraseña">
                    </div>
                    
                    <button type="submit" class="btn-login">🚒 INGRESAR AL SISTEMA</button>
                    
                    <div id="loginError" class="login-error" style="display: none;"></div>
                </form>
                
                <div class="login-info">
                    <h4>👨‍💼 Administrador:</h4>
                    <p><strong>Usuario:</strong> admin</p>
                    <p><strong>Contraseña:</strong> 1234</p>
                    
                    <h4>👨‍🚒 Usuarios de Prueba:</h4>
                    <p><strong>Comandante:</strong> comandante@bomberos.cl / admin123</p>
                    <p><strong>Capitán:</strong> capitan@bomberos.cl / cap456</p>
                    <p><strong>Bombero:</strong> bombero@bomberos.cl / bomb345</p>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript para login -->
    <script src="login.js"></script>
</body>
</html>
